<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edmate QC Content Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
MathJax = {
  tex: {
    inlineMath: [['\\(','\\)'],['$','$']],
    displayMath: [['\\[','\\]'],['$$','$$']]
  },
  options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'] },
  startup: { typeset: true }
};
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>
:root {
  --primary: #6366f1;
  --primary-light: #818cf8;
  --primary-dark: #4f46e5;
  --bg: #0f172a;
  --sidebar-bg: rgba(15,23,42,0.97);
  --card-bg: rgba(30,41,59,0.7);
  --card-bg2: rgba(30,41,59,0.95);
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.2);
  --text: #f1f5f9;
  --text-dim: #64748b;
  --text-mid: #94a3b8;
  --success: #10b981;
  --warning: #f59e0b;
  --error: #ef4444;
  --sidebar-w: 300px;
}
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
body { background:var(--bg); color:var(--text); height:100vh; display:flex; overflow:hidden; }

/* ── SIDEBAR ── */
aside {
  width:var(--sidebar-w); min-width:var(--sidebar-w);
  background:var(--sidebar-bg);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  backdrop-filter:blur(20px);
}
.sidebar-header { padding:20px 20px 16px; border-bottom:1px solid var(--border); }
.logo { font-size:1.3rem; font-weight:700;
  background:linear-gradient(135deg,#818cf8,#6366f1);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
}
.logo-sub { font-size:0.72rem; color:var(--text-dim); margin-top:2px; letter-spacing:.5px; }

/* ── CUSTOM DROPDOWN ── */
.paper-selector { padding:14px 16px; border-bottom:1px solid var(--border); position:relative; }
.selector-label { font-size:0.68rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:.8px; margin-bottom:8px; }

.selected-badge {
  display:none; align-items:center; justify-content:space-between;
  background:rgba(99,102,241,0.15); border:1px solid rgba(99,102,241,0.3);
  border-radius:8px; padding:10px 12px; cursor:pointer; transition:.15s;
}
.selected-badge:hover { background:rgba(99,102,241,0.22); }
.selected-badge.visible { display:flex; }
.badge-text { font-size:0.8rem; font-weight:600; color:var(--primary-light); line-height:1.3; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.badge-change { font-size:0.68rem; color:var(--text-dim); flex-shrink:0; margin-left:8px; }

.search-box { position:relative; }
.search-box.hidden { display:none; }
.search-input {
  width:100%; padding:10px 36px 10px 12px;
  background:rgba(255,255,255,0.05); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-size:0.82rem; outline:none;
  transition:.15s;
}
.search-input::placeholder { color:var(--text-dim); }
.search-input:focus { border-color:rgba(99,102,241,0.5); background:rgba(99,102,241,0.07); }
.search-icon { position:absolute; right:10px; top:50%; transform:translateY(-50%); color:var(--text-dim); font-size:.9rem; pointer-events:none; }

.dropdown-list {
  display:none; position:absolute; top:calc(100% + 4px); left:0; right:0;
  background:#1e293b; border:1px solid var(--border); border-radius:10px;
  max-height:280px; overflow-y:auto; z-index:100;
  box-shadow:0 20px 40px rgba(0,0,0,.5);
}
.dropdown-list.open { display:block; }
.dropdown-item {
  padding:10px 14px; cursor:pointer; font-size:0.8rem;
  border-bottom:1px solid rgba(255,255,255,0.04);
  transition:.1s; display:flex; flex-direction:column; gap:2px;
}
.dropdown-item:last-child { border-bottom:none; }
.dropdown-item:hover { background:rgba(99,102,241,0.15); }
.dropdown-item .di-code { color:var(--text); font-weight:500; }
.dropdown-item .di-table { font-size:0.68rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:.5px; }
.dropdown-empty { padding:14px; color:var(--text-dim); font-size:0.8rem; text-align:center; }

/* ── QUESTION LIST ── */
.question-list { flex:1; overflow-y:auto; padding:10px; }
.section-label { font-size:0.65rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:.8px; padding:6px 8px 4px; }
.q-item {
  padding:9px 14px; margin-bottom:4px; border-radius:8px; cursor:pointer;
  transition:.15s; border:1px solid transparent; display:flex; justify-content:space-between; align-items:center;
}
.q-item:hover { background:rgba(255,255,255,0.05); }
.q-item.active { background:rgba(99,102,241,0.18); border-color:rgba(99,102,241,0.35); }
.q-number { font-weight:600; color:var(--primary-light); font-size:0.85rem; }
.q-dot { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,0.12); flex-shrink:0; transition:.2s; }
.q-dot.has-content { background:var(--success); }
.q-dot.unverified { background:var(--warning); }

/* ── MAIN CONTENT ── */
main { flex:1; overflow-y:auto; padding:36px; background:radial-gradient(ellipse at 20% 0%, rgba(99,102,241,0.06) 0%, transparent 60%); }
.container { max-width:880px; margin:0 auto; }
.card { background:var(--card-bg); border:1px solid var(--border); border-radius:16px; padding:28px; margin-bottom:20px; backdrop-filter:blur(12px); }

/* Tags */
.tag { display:inline-block; padding:3px 10px; border-radius:20px; font-size:0.7rem; font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px; margin-right:6px; }
.tag-blue { background:rgba(59,130,246,0.18); color:#60a5fa; }
.tag-green { background:rgba(16,185,129,0.15); color:#34d399; }
.tag-orange { background:rgba(245,158,11,0.15); color:#fbbf24; }

/* Question */
.q-title { font-size:1.7rem; font-weight:700; margin-bottom:18px; }
.q-body { font-size:1rem; line-height:1.65; margin-bottom:22px; color:#cbd5e1; }

/* Options */
.options-grid { display:grid; gap:10px; margin-bottom:8px; }
.option {
  padding:14px 18px; background:rgba(255,255,255,0.025); border:1px solid var(--border);
  border-radius:10px; display:flex; align-items:flex-start; transition:.15s;
}
.option.correct { background:rgba(16,185,129,0.1); border-color:rgba(16,185,129,0.4); }
.opt-letter {
  width:26px; height:26px; background:rgba(255,255,255,0.08); border-radius:7px;
  display:flex; align-items:center; justify-content:center; font-weight:700;
  margin-right:14px; flex-shrink:0; font-size:0.8rem;
}
.option.correct .opt-letter { background:var(--success); color:#fff; }
.opt-text { line-height:1.5; font-size:0.93rem; color:#cbd5e1; }

/* Tabs */
.tabs { display:flex; gap:4px; border-bottom:1px solid var(--border); margin-bottom:22px; }
.tab {
  padding:10px 18px; cursor:pointer; border-bottom:2px solid transparent;
  color:var(--text-dim); font-weight:500; font-size:0.88rem; transition:.15s;
}
.tab:hover { color:var(--text-mid); }
.tab.active { color:var(--primary-light); border-bottom-color:var(--primary); }
.tab-content { display:none; }
.tab-content.active { display:block; }

/* ── EXPLANATION (rendered markdown) ── */
.explanation { line-height:1.75; color:#cbd5e1; font-size:0.93rem; }
.explanation p { margin-bottom:14px; }
.explanation strong, .explanation b { color:#f1f5f9; font-weight:600; }
.explanation em { color:#a5b4fc; font-style:italic; }
.explanation ul, .explanation ol { margin:10px 0 14px 20px; }
.explanation li { margin-bottom:6px; }
.explanation h1,.explanation h2,.explanation h3 { color:#f1f5f9; margin:18px 0 10px; font-weight:600; }
.explanation h1 { font-size:1.15rem; }
.explanation h2 { font-size:1.05rem; }
.explanation h3 { font-size:0.97rem; }
.explanation code { background:rgba(99,102,241,0.15); padding:1px 6px; border-radius:4px; font-family:monospace; font-size:0.87rem; color:#a5b4fc; }
.explanation blockquote { border-left:3px solid var(--primary); padding-left:14px; margin:12px 0; color:var(--text-mid); font-style:italic; }
.explanation hr { border:none; border-top:1px solid var(--border); margin:18px 0; }
.explanation table { width:100%; border-collapse:collapse; margin:12px 0; }
.explanation th { background:rgba(99,102,241,0.15); padding:8px 12px; text-align:left; font-size:0.85rem; }
.explanation td { padding:8px 12px; border-bottom:1px solid var(--border); font-size:0.85rem; }

/* Option Analysis */
.opt-analysis-item { margin-bottom:14px; padding:14px; background:rgba(255,255,255,0.03); border-radius:10px; }
.opt-analysis-label { font-size:0.78rem; font-weight:700; color:var(--primary-light); margin-bottom:6px; }

/* Diagram */
.diagram-wrap { margin:20px 0; text-align:center; }
.diagram-wrap img { max-width:100%; border-radius:12px; border:1px solid var(--border); }

/* Empty states */
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:55vh; color:var(--text-dim); text-align:center; gap:10px; }
.empty-state h2 { color:var(--text); font-size:1.4rem; }
.loading-text { color:var(--text-dim); font-size:0.85rem; padding:20px; }

/* Scrollbar */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:10px; }

/* ══════════════════════════════════════════
   FLASHCARD MODAL  (7taps-inspired)
══════════════════════════════════════════ */
.fc-wrapper {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:28px;
  padding:10px 0 20px;
}

/* progress bar strip */
.fc-progress-bar {
  width:100%;
  display:flex;
  gap:4px;
  justify-content:center;
}
.fc-pip {
  height:4px;
  flex:1;
  max-width:40px;
  border-radius:99px;
  background:rgba(255,255,255,0.12);
  transition:background .3s;
}
.fc-pip.done { background:var(--primary); }
.fc-pip.current { background:var(--primary-light); }

/* counter */
.fc-counter {
  font-size:0.78rem;
  color:var(--text-dim);
  letter-spacing:.5px;
  font-weight:500;
}

/* the card scene */
.fc-scene {
  perspective:1200px;
  width:100%;
  max-width:600px;
  cursor:pointer;
}
.fc-card {
  width:100%;
  min-height:220px;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .55s cubic-bezier(.45,.05,.55,.95);
  border-radius:20px;
}
.fc-card.flipped { transform:rotateY(180deg); }

/* faces */
.fc-face {
  position:absolute;
  inset:0;
  border-radius:20px;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  padding:32px 28px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}
.fc-face-front {
  background:linear-gradient(135deg, rgba(99,102,241,0.25) 0%, rgba(79,70,229,0.15) 100%);
  border:1px solid rgba(99,102,241,0.35);
}
.fc-face-back {
  background:linear-gradient(135deg, rgba(16,185,129,0.15) 0%, rgba(5,150,105,0.1) 100%);
  border:1px solid rgba(16,185,129,0.3);
  transform:rotateY(180deg);
}

.fc-label {
  font-size:0.65rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:1.2px;
  margin-bottom:16px;
  opacity:0.5;
}
.fc-face-front .fc-label { color:var(--primary-light); }
.fc-face-back .fc-label { color:#34d399; }

.fc-text {
  font-size:1rem;
  line-height:1.65;
  font-weight:500;
  color:var(--text);
}
.fc-text p { margin:6px 0; }
.fc-text strong { color:#f1f5f9; }

.fc-tap-hint {
  margin-top:20px;
  font-size:0.72rem;
  color:rgba(255,255,255,0.25);
  display:flex;
  align-items:center;
  gap:5px;
}
.fc-tap-hint svg { opacity:.5; }

/* nav row */
.fc-nav {
  display:flex;
  align-items:center;
  gap:16px;
}
.fc-nav-btn {
  width:48px; height:48px;
  border-radius:50%;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.05);
  color:var(--text-mid);
  font-size:1.2rem;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:.18s;
  outline:none;
}
.fc-nav-btn:hover:not(:disabled) {
  background:rgba(99,102,241,0.2);
  border-color:rgba(99,102,241,0.4);
  color:var(--primary-light);
  transform:scale(1.08);
}
.fc-nav-btn:disabled { opacity:0.25; cursor:not-allowed; transform:none; }

.fc-nav-center {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  min-width:90px;
}
.fc-flip-btn {
  padding:9px 20px;
  border-radius:99px;
  border:1px solid rgba(99,102,241,0.4);
  background:rgba(99,102,241,0.15);
  color:var(--primary-light);
  font-size:0.8rem;
  font-weight:600;
  cursor:pointer;
  transition:.18s;
  outline:none;
  letter-spacing:.3px;
}
.fc-flip-btn:hover {
  background:rgba(99,102,241,0.28);
  transform:scale(1.04);
}

/* no-flashcard state inside the tab */
.fc-empty {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
  text-align:center;
  gap:10px;
  color:var(--text-dim);
}
.fc-empty .fc-empty-icon { font-size:2.5rem; margin-bottom:6px; opacity:0.4; }
.fc-empty p { font-size:0.88rem; line-height:1.6; max-width:360px; }
</style>
</head>
<body>

<aside>
  <div class="sidebar-header">
    <div class="logo">Edmate AI</div>
    <div class="logo-sub">Content QC Pipeline Viewer</div>
  </div>

  <div class="paper-selector" id="paperSelector">
    <div class="selector-label">Select Paper</div>

    <div class="selected-badge" id="selectedBadge" onclick="clearSelection()">
      <div class="badge-text" id="badgeText">—</div>
      <div class="badge-change">✕ change</div>
    </div>

    <div class="search-box" id="searchBox">
      <input class="search-input" id="searchInput" type="text" placeholder="Type to search papers…" autocomplete="off">
      <span class="search-icon">⌕</span>
      <div class="dropdown-list" id="dropdownList"></div>
    </div>
  </div>

  <div class="question-list" id="questionList">
    <div class="loading-text">Select a paper to load questions.</div>
  </div>
</aside>

<main>
  <div class="container" id="contentView">
    <div class="empty-state">
      <span style="font-size:2.5rem">🔬</span>
      <h2>Ready to Verify</h2>
      <p>Select a paper and question to begin QC review.</p>
    </div>
  </div>
</main>

<script>
const API = '/api';
let allPapers = [];
let currentTable = null;

// ── Flashcard state ──────────────────────────────────────────────
let fcCards = [];
let fcIndex = 0;
let fcFlipped = false;

// ── Dropdown logic ────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch(`${API}/papers`);
    if (!res.ok) throw new Error('failed');
    allPapers = await res.json();
    renderDropdown(allPapers);
  } catch {
    document.getElementById('questionList').innerHTML =
      '<div class="loading-text" style="color:#ef4444">⚠ Could not connect to backend.</div>';
  }
}

function renderDropdown(papers) {
  const list = document.getElementById('dropdownList');
  list.innerHTML = '';
  if (!papers.length) {
    list.innerHTML = '<div class="dropdown-empty">No papers found.</div>';
    return;
  }
  papers.forEach(p => {
    const item = document.createElement('div');
    item.className = 'dropdown-item';
    const subject = p.table.replace('_questions','').replace('igcse_','IGCSE ');
    item.innerHTML = `<span class="di-code">${p.code}</span><span class="di-table">${subject}</span>`;
    item.onclick = () => selectPaper(p);
    list.appendChild(item);
  });
}

document.getElementById('searchInput').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  const filtered = allPapers.filter(p =>
    p.code.toLowerCase().includes(q) ||
    p.table.toLowerCase().includes(q)
  );
  renderDropdown(filtered);
  document.getElementById('dropdownList').classList.add('open');
});

document.getElementById('searchInput').addEventListener('focus', () => {
  renderDropdown(allPapers);
  document.getElementById('dropdownList').classList.add('open');
});

document.addEventListener('click', e => {
  if (!document.getElementById('paperSelector').contains(e.target)) {
    document.getElementById('dropdownList').classList.remove('open');
  }
});

function selectPaper(p) {
  document.getElementById('selectedBadge').classList.add('visible');
  document.getElementById('badgeText').textContent =
    `${p.code}  ·  ${p.table.replace('_questions','').replace('igcse_','IGCSE ')}`;
  document.getElementById('searchBox').classList.add('hidden');
  document.getElementById('searchInput').value = '';
  document.getElementById('dropdownList').classList.remove('open');
  currentTable = p.table;
  loadQuestions(p.table, p.code);
}

function clearSelection() {
  document.getElementById('selectedBadge').classList.remove('visible');
  document.getElementById('searchBox').classList.remove('hidden');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchInput').focus();
  document.getElementById('questionList').innerHTML =
    '<div class="loading-text">Select a paper to load questions.</div>';
  document.getElementById('contentView').innerHTML = `
    <div class="empty-state">
      <span style="font-size:2.5rem">🔬</span>
      <h2>Ready to Verify</h2>
      <p>Select a paper and question to begin QC review.</p>
    </div>`;
  currentTable = null;
}

// ── Question list ────────────────────────────────────────────────
async function loadQuestions(table, code) {
  const list = document.getElementById('questionList');
  list.innerHTML = '<div class="loading-text">Loading questions…</div>';
  try {
    const res = await fetch(`${API}/questions?table=${table}&paper_code=${encodeURIComponent(code)}`);
    if (!res.ok) throw new Error('failed');
    const qs = await res.json();
    list.innerHTML = '';
    if (!qs.length) {
      list.innerHTML = '<div class="loading-text">No questions found.</div>';
      return;
    }
    list.innerHTML = `<div class="section-label">${qs.length} questions</div>`;
    qs.forEach((q, i) => {
      const hasContent = !!(q.summary_explanation);
      const isVerified = q.is_verified;
      const div = document.createElement('div');
      div.className = 'q-item';
      div.innerHTML = `
        <span class="q-number">Q${q.question_number || (i+1)}</span>
        <span class="q-dot ${isVerified ? 'has-content' : hasContent ? 'unverified' : ''}"></span>
      `;
      div.onclick = () => { renderQuestion(q, table); setActive(div); };
      list.appendChild(div);
    });
  } catch {
    list.innerHTML = '<div class="loading-text" style="color:#ef4444">Failed to load questions.</div>';
  }
}

function setActive(el) {
  document.querySelectorAll('.q-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
}

// ── Markdown → HTML (handles mixed HTML + markdown inline markers) ──
function markdownToHtml(text) {
  if (!text) return '';

  // Clean up any HTML tags that might have been incorrectly inserted into LaTeX blocks
  // e.g., \(6.02 \times 10<sup>23</sup>\) -> \(6.02 \times 10^{23}\)
  const replaceSubSup = (match) => {
    return match
      .replace(/<sup[^>]*>(.*?)<\/sup>/g, '^{$1}')
      .replace(/<sub[^>]*>(.*?)<\/sub>/g, '_{$1}')
      // In case there are other stray tags like <p> or <strong> inside math blocks, remove just the tags
      .replace(/<\/?(p|strong|em|br)[^>]*>/g, '');
  };

  // Process \( ... \)
  text = text.replace(/\\\([\s\S]*?\\\)/g, replaceSubSup);
  // Process \[ ... \]
  text = text.replace(/\\\[[\s\S]*?\\\]/g, replaceSubSup);
  // Process $$ ... $$
  text = text.replace(/\$\$[\s\S]*?\$\$/g, replaceSubSup);

  const hasHtmlBlocks = /<[a-z][\s\S]*>/i.test(text);

  if (hasHtmlBlocks) {
    // Content already has HTML structure — but may still have raw **bold** / *italic* markers.
    // Apply inline markdown transforms WITHOUT escaping < > (HTML is intentional).
    return text
      // Bold+italic combo
      .replace(/\*\*\*(.+?)\*\*\*/gs, '<strong><em>$1</em></strong>')
      // Bold
      .replace(/\*\*(.+?)\*\*/gs, '<strong>$1</strong>')
      // Italic (only if not already inside a tag)
      .replace(/(?<![a-zA-Z="])\*(?!\s)(.+?)(?<!\s)\*/gs, '<em>$1</em>')
      // __bold__
      .replace(/__(.+?)__/g, '<strong>$1</strong>')
      // Bare newlines → <br> (outside of block tags)
      .replace(/(?<!>)\n(?!<)/g, '<br>');
  }

  // Pure markdown — full conversion
  let html = text
    // Headers
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')

    // Bold + italic combos first
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/__(.+?)__/g, '<strong>$1</strong>')
    .replace(/_(.+?)_/g, '<em>$1</em>')

    // Inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')

    // Horizontal rules
    .replace(/^---+$/gm, '<hr>')

    // Bullet lists
    .replace(/^\s*[-*]\s+(.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>')

    // Numbered lists
    .replace(/^\s*\d+\.\s+(.+)$/gm, '<li>$1</li>')

    // Blockquotes
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

  // Wrap paragraphs
  html = html
    .split(/\n{2,}/)
    .map(block => {
      const t = block.trim();
      if (!t) return '';
      if (/^<(h[1-3]|ul|ol|li|hr|blockquote)/.test(t)) return block;
      return `<p>${block.replace(/\n/g, '<br>')}</p>`;
    })
    .join('\n');

  return html;
}

// ── Typeset MathJax after dynamic content is inserted ─────────────
function typesetMath() {
  if (window.MathJax && MathJax.typesetPromise) {
    // Clear previous typeset state so re-renders don't error
    if (MathJax.startup && MathJax.startup.document) {
      MathJax.startup.document.clear();
      MathJax.startup.document.updateDocument();
    }
    MathJax.typesetPromise().catch(() => {});
  }
}

// ── Render question ───────────────────────────────────────────────
function renderQuestion(q, table) {
  const subject = (table || '').replace('_questions','').replace('igcse_','IGCSE ').toUpperCase();
  const view = document.getElementById('contentView');

  // Option analysis HTML
  let oeHtml = '';
  if (q.option_explanations && q.option_explanations.length > 0) {
    oeHtml = q.option_explanations.map((exp, i) => `
      <div class="opt-analysis-item">
        <div class="opt-analysis-label">Option ${String.fromCharCode(65+i)}
          ${q.correct_options && q.correct_options.includes(i) ? '✓ Correct' : ''}
        </div>
        <div class="explanation">${markdownToHtml(exp) || 'No detail.'}</div>
      </div>`).join('');
  } else {
    oeHtml = '<p style="color:var(--text-dim);font-size:.9rem">No option analysis generated yet.</p>';
  }

  // Diagram
  const diagramHtml = q.diagrams
    ? `<div class="diagram-wrap"><img src="${q.diagrams}" alt="Question diagram"></div>`
    : '';

  // Explanation
  const explanationHtml = q.summary_explanation
    ? markdownToHtml(q.summary_explanation)
    : '<p style="color:var(--text-dim)">No explanation generated yet. Run the AI pipeline for this paper.</p>';

  view.innerHTML = `
    <div class="card">
      <div>
        <span class="tag tag-blue">${subject}</span>
        <span class="tag tag-green">${q.question_identifier || ''}</span>
        ${q.is_verified ? '<span class="tag tag-orange">✓ Verified</span>' : ''}
      </div>
      <h1 class="q-title">Question ${q.question_number || ''}</h1>
      <div class="q-body">${q.title || '<em style="color:var(--text-dim)">[No question text]</em>'}</div>
      ${diagramHtml}
      <div class="options-grid">
        ${(q.options || []).map((opt, i) => `
          <div class="option ${q.correct_options && q.correct_options.includes(i) ? 'correct' : ''}">
            <div class="opt-letter">${String.fromCharCode(65+i)}</div>
            <div class="opt-text">${opt || '<em style="color:var(--text-dim)">[empty]</em>'}</div>
          </div>`).join('')}
      </div>
    </div>

    <div class="card" style="padding:24px 28px">
      <div class="tabs">
        <div class="tab active" data-tab="tab-explanation">General Explanation</div>
        <div class="tab" data-tab="tab-options">Option Analysis</div>
        <div class="tab" data-tab="tab-flashcards">Flashcards</div>
      </div>

      <div class="tab-content active" id="tab-explanation">
        <div class="explanation">${explanationHtml}</div>
      </div>

      <div class="tab-content" id="tab-options">${oeHtml}</div>

      <div class="tab-content" id="tab-flashcards">
        <div id="flashcardContainer">
          <div class="loading-text">Click the Flashcards tab to load…</div>
        </div>
      </div>
    </div>
  `;

  // Tab switching
  view.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
      view.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      view.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      view.querySelector(`#${tab.dataset.tab}`).classList.add('active');
      if (tab.dataset.tab === 'tab-flashcards') {
        loadFlashcards(q.topic_id, q.subtopic_id, q.question_identifier);
      }
      typesetMath();
    };
  });

  // Typeset LaTeX in the initial render
  typesetMath();
}

// ── Flashcard modal UX ────────────────────────────────────────────
async function loadFlashcards(topicId, subtopicId, questionIdentifier) {
  const container = document.getElementById('flashcardContainer');
  if (!container) return;

  let isFallback = false;
  if (!topicId || topicId === 'unknown-topic') {
    isFallback = true;
    topicId = 'unknown-topic';
  }

  container.innerHTML = '<div class="loading-text">Loading flashcards…</div>';
  try {
    let url = `${API}/flashcards?topic_id=${encodeURIComponent(topicId)}`;
    if (subtopicId) url += `&subtopic_id=${encodeURIComponent(subtopicId)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error();
    const cards = await res.json();

    if (!cards.length) {
      container.innerHTML = `
        <div class="fc-empty">
          <div class="fc-empty-icon">🃏</div>
          <p>No flashcards found for this topic yet.</p>
        </div>`;
      return;
    }

    // Initialise state
    fcCards = cards;
    fcIndex = 0;
    fcFlipped = false;
    renderFlashcardViewer(container, isFallback);
    typesetMath();
  } catch {
    container.innerHTML = '<p style="color:var(--text-dim);font-size:.9rem">Could not load flashcards.</p>';
  }
}

function renderFlashcardViewer(container, isFallback) {
  const total = fcCards.length;
  
  const fallbackWarning = isFallback ? 
    `<div style="color: #ffcc00; font-size: 0.85rem; text-align: center; margin-bottom: 12px; font-weight: 500;">
       ⚠️ Note: Showing fallback flashcards. This question has not been explicitly mapped to a specific topic yet.
     </div>` : '';

  container.innerHTML = `
    ${fallbackWarning}
    <div class="fc-wrapper">

      <!-- progress pips -->
      <div class="fc-progress-bar" id="fcPips"></div>

      <!-- counter -->
      <div class="fc-counter" id="fcCounter"></div>

      <!-- 3D card -->
      <div class="fc-scene" id="fcScene" onclick="flipCard()">
        <div class="fc-card" id="fcCard">
          <div class="fc-face fc-face-front">
            <div class="fc-label">Question</div>
            <div class="fc-text" id="fcFrontText"></div>
            <div class="fc-tap-hint">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M7 7h10M7 12h10M7 17h10"/>
              </svg>
              Tap to reveal answer
            </div>
          </div>
          <div class="fc-face fc-face-back">
            <div class="fc-label">Answer</div>
            <div class="fc-text" id="fcBackText"></div>
            <div class="fc-tap-hint">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.12"/>
              </svg>
              Tap to flip back
            </div>
          </div>
        </div>
      </div>

      <!-- navigation -->
      <div class="fc-nav">
        <button class="fc-nav-btn" id="fcPrev" onclick="prevCard()" title="Previous">&#8592;</button>
        <div class="fc-nav-center">
          <button class="fc-flip-btn" onclick="flipCard()">↩ Flip</button>
        </div>
        <button class="fc-nav-btn" id="fcNext" onclick="nextCard()" title="Next">&#8594;</button>
      </div>

    </div>`;

  updateFlashcardDisplay();
}

function updateFlashcardDisplay() {
  const total = fcCards.length;
  const card = fcCards[fcIndex];

  // Pips
  const pipsEl = document.getElementById('fcPips');
  if (pipsEl) {
    pipsEl.innerHTML = fcCards.map((_, i) => {
      const cls = i < fcIndex ? 'done' : i === fcIndex ? 'current' : '';
      return `<div class="fc-pip ${cls}"></div>`;
    }).join('');
  }

  // Counter
  const counter = document.getElementById('fcCounter');
  if (counter) counter.textContent = `${fcIndex + 1} / ${total}`;

  // Card texts
  const frontEl = document.getElementById('fcFrontText');
  const backEl = document.getElementById('fcBackText');
  if (frontEl) frontEl.innerHTML = markdownToHtml(card.frontText || 'No front text');
  if (backEl) backEl.innerHTML = markdownToHtml(cleanBackText(card.backText || 'No answer'));

  // Reset flip state
  fcFlipped = false;
  const cardEl = document.getElementById('fcCard');
  if (cardEl) cardEl.classList.remove('flipped');

  // Nav button states
  const prevBtn = document.getElementById('fcPrev');
  const nextBtn = document.getElementById('fcNext');
  if (prevBtn) prevBtn.disabled = fcIndex === 0;
  if (nextBtn) nextBtn.disabled = fcIndex === total - 1;

  // Keyboard nav
  document.onkeydown = handleFcKey;

  // Re-typeset any math in flashcard content
  typesetMath();
}

function cleanBackText(text) {
  // Remove embedded "Flashcard N: ... Back: ..." chunks that were AI formatting errors
  // Keep only the first answer (before any "Flashcard 2:" pattern)
  return text.replace(/\n?\n?(?:Flashcard \d+:|Option [A-D]:)[\s\S]*/i, '').trim();
}

function flipCard() {
  fcFlipped = !fcFlipped;
  const cardEl = document.getElementById('fcCard');
  if (cardEl) cardEl.classList.toggle('flipped', fcFlipped);
}

function prevCard() {
  if (fcIndex > 0) { fcIndex--; updateFlashcardDisplay(); }
}

function nextCard() {
  if (fcIndex < fcCards.length - 1) { fcIndex++; updateFlashcardDisplay(); }
}

function handleFcKey(e) {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); nextCard(); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevCard(); }
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
}

init();
</script>
