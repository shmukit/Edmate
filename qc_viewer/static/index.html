<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edmate QC Content Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="shortcut icon" href="/favicon.svg">
<script>
MathJax = {
  tex: {
    inlineMath: [['\\(','\\)'],['$','$']],
    displayMath: [['\\[','\\]'],['$$','$$']]
  },
  options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'] },
  startup: { typeset: true }
};
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="/css/automate.css">
    <link rel="stylesheet" href="/css/viewer.css">
</head>
<body>

  </div>

<aside id="mainSidebar">
  <div class="sidebar-header">
    <div class="logo">
        <svg width="24" height="24" viewBox="0 0 32 32" style="color: var(--primary)">
            <path d="M19 5L10 18H15.5L12.5 27L22 14H16.5L19 5Z" fill="currentColor"/>
        </svg>
        <span>Edmate AI</span>
    </div>
    <button class="btn-collapse" id="btnCollapseSidebar" title="Toggle Sidebar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>
  </div>

  <div class="sidebar-content">
    <nav>
      <a href="/" class="nav-item active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <span>Standard Viewer</span>
      </a>
      <a href="/automate" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
        </svg>
        <span>Automation Hub</span>
      </a>
      <a href="/analytics" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"></line>
          <line x1="12" y1="20" x2="12" y2="4"></line>
          <line x1="6" y1="20" x2="6" y2="14"></line>
        </svg>
        <span>Analytics</span>
      </a>
    </nav>
  
    <div class="sidebar-divider"></div>
  
    <div class="paper-selector" id="paperSelector">
      <div class="selector-label">Search Papers</div>
  
      <div class="selected-badge" id="selectedBadge" onclick="clearSelection()" style="margin-top: 8px;">
        <div class="badge-text" id="badgeText">—</div>
        <div class="badge-change">✕ change</div>
      </div>
  
      <div class="search-box" id="searchBox" style="margin-top: 8px;">
        <input class="search-input" id="searchInput" type="text" placeholder="Search papers..." autocomplete="off">
        <span class="search-icon">⌕</span>
        <div class="dropdown-list" id="dropdownList"></div>
      </div>
    </div>
  
    <div class="question-list" id="questionList">
      <div class="loading-text">Select a paper to load questions.</div>
    </div>
  </div>
</aside>

<main>
  <div class="container" id="contentView">
    <nav class="breadcrumb-nav">
      <div class="breadcrumb-item"><a href="/">Edmate AI</a></div>
      <div class="breadcrumb-item active">Standard Viewer</div>
    </nav>

    <header class="workspace-header">
        <div class="header-title-group">
            <h1>Dashboard</h1>
            <p class="subtitle">Quality control and verification workspace.</p>
        </div>
        <div class="header-actions-group">
            <button id="btnMobileNav" class="btn-mobile-nav" title="Toggle Menu">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <div class="theme-toggle-container">
                <button id="themeToggle" class="btn-theme-toggle" title="Toggle Theme">
                    <span class="theme-icon-light">☀️</span>
                    <span class="theme-icon-dark">🌙</span>
                </button>
            </div>
        </div>
    </header>

    <div class="empty-state">
      <span style="font-size:3rem">🔬</span>
      <h2>Ready to Verify</h2>
      <p>Select a paper from the sidebar to begin your QC review process.</p>
    </div>
  </div>
</main>

<script type="module">
import { ThemeManager } from '/js/theme.js';
import { LayoutManager } from '/js/ui.js';
import { bootStandardViewer } from '/js/controllers/viewer.js';

ThemeManager.init();
LayoutManager.init();
bootStandardViewer();
</script>
</body>
</html>
