<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edmate QC Content Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --success: #10b981;
            --accent: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Styles */
        aside {
            width: 320px;
            background: rgba(15, 23, 42, 0.8);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .paper-selector {
            padding: 20px;
        }

        select {
            width: 100%;
            padding: 12px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            outline: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        select:focus {
            border-color: var(--primary);
        }

        .question-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .q-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .q-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .q-item.active {
            background: rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.4);
        }

        .q-number {
            font-weight: 600;
            color: var(--primary-light);
        }

        .q-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #475569;
        }

        .q-status.verified {
            background: var(--success);
        }

        /* Main Content Styles */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1, h2, h3 { margin-bottom: 16px; }

        .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .tag-blue { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .tag-green { background: rgba(16, 185, 129, 0.2); color: #34d399; }

        .question-body {
            font-size: 1.125rem;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .options-grid {
            display: grid;
            gap: 12px;
            margin-bottom: 32px;
        }

        .option {
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            align-items: flex-start;
            transition: all 0.2s;
        }

        .option.correct {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.4);
        }

        .opt-letter {
            width: 28px;
            height: 28px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-right: 16px;
            flex-shrink: 0;
            font-size: 0.875rem;
        }

        .option.correct .opt-letter {
            background: var(--success);
            color: white;
        }

        /* Tabs Styles */
        .tabs {
            display: flex;
            gap: 16px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .tab {
            padding: 12px 24px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: var(--text-dim);
            font-weight: 500;
            transition: all 0.2s;
        }

        .tab.active {
            color: var(--primary-light);
            border-bottom-color: var(--primary);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }

        .explanation {
            line-height: 1.7;
            color: #cbd5e1;
        }

        .explanation ul, .explanation ol {
            padding-left: 20px;
            margin: 16px 0;
        }

        .explanation li { margin-bottom: 8px; }

        /* Flashcard Styles */
        .flashcards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .fc-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            position: relative;
        }

        .fc-label {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .fc-front { font-weight: 600; margin-bottom: 12px; color: white; }
        .fc-back { color: var(--text-dim); font-size: 0.9375rem; border-top: 1px solid var(--border); padding-top: 12px; }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            color: var(--text-dim);
        }

        .empty-state h2 { color: var(--text-main); margin-bottom: 8px; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>
    <aside>
        <div class="sidebar-header">
            <div class="logo">Edmate AI</div>
            <p style="font-size: 0.8rem; color: var(--text-dim)">Content QC Pipeline Viewer</p>
        </div>
        <div class="paper-selector">
            <label style="display: block; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase;">Select Paper</label>
            <select id="paperSelect">
                <option value="">Loading papers...</option>
            </select>
        </div>
        <div class="question-list" id="questionList">
            <!-- Questions populated here -->
        </div>
    </aside>

    <main>
        <div class="container" id="contentView">
            <div class="empty-state">
                <h2>Select a Question</h2>
                <p>Choose a question from the sidebar to visualize the AI content.</p>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = '/api';
        let currentQuestions = [];
        let currentTable = "";

        async function init() {
            try {
                const resp = await fetch(`${API_BASE}/papers`);
                const papers = await resp.json();
                const select = document.getElementById('paperSelect');
                select.innerHTML = '<option value="">-- Choose Paper --</option>';
                
                papers.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = JSON.stringify(p);
                    opt.textContent = `${p.code} (${p.table.split('_')[0]})`;
                    select.appendChild(opt);
                });

                select.onchange = async (e) => {
                    const val = e.target.value;
                    if (!val) return;
                    const p = JSON.parse(val);
                    loadQuestions(p.table, p.code);
                };
            } catch (err) {
                console.error("Init error", err);
            }
        }

        async function loadQuestions(table, code) {
            currentTable = table;
            const list = document.getElementById('questionList');
            list.innerHTML = '<p style="padding: 20px; color: var(--text-dim)">Loading questions...</p>';
            
            try {
                const resp = await fetch(`${API_BASE}/questions?table=${table}&paper_code=${code}`);
                currentQuestions = await resp.json();
                
                list.innerHTML = '';
                currentQuestions.forEach((q, idx) => {
                    const div = document.createElement('div');
                    div.className = `q-item`;
                    div.innerHTML = `
                        <span class="q-number">Q${q.question_number || idx+1}</span>
                        <span class="q-status ${q.is_verified ? 'verified' : ''}"></span>
                    `;
                    div.onclick = () => renderMainView(q, div);
                    list.appendChild(div);
                });
            } catch (err) {
                list.innerHTML = '<p style="padding: 20px; color: #ef4444">Failed to load questions</p>';
            }
        }

        function renderMainView(q, element) {
            // Update active state in list
            document.querySelectorAll('.q-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            const view = document.getElementById('contentView');
            
            // Clean up and prepare option explanations
            let oeHtml = "";
            if (q.option_explanations && q.option_explanations.length > 0) {
                oeHtml = `
                    <div class="explanation">
                        ${q.option_explanations.map((exp, i) => `
                            ${exp ? `<p><strong>Option ${String.fromCharCode(65 + i)}:</strong> ${exp}</p>` : ''}
                        `).join('')}
                    </div>
                `;
            }

            view.innerHTML = `
                <div class="card">
                    <span class="tag tag-blue">${currentTable.replace('_questions', '').toUpperCase()}</span>
                    <span class="tag tag-green">${q.question_identifier}</span>
                    <h1 style="font-size: 2rem; margin-bottom: 24px;">Question ${q.question_number}</h1>
                    
                    <div class="question-body">
                        ${q.title || "No question text available."}
                    </div>

                    ${q.diagrams ? `<div style="margin-bottom: 30px; text-align: center;"><img src="${q.diagrams}" style="max-width: 100%; border-radius: 12px; border: 1px solid var(--border);"></div>` : ''}

                    <div class="options-grid">
                        ${(q.options || []).map((opt, i) => `
                            <div class="option ${q.correct_options && q.correct_options.includes(i) ? 'correct' : ''}">
                                <div class="opt-letter">${String.fromCharCode(65+i)}</div>
                                <div class="opt-text">${opt}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="card" style="padding: 16px;">
                    <div class="tabs">
                        <div class="tab active" data-tab="summary">General Explanation</div>
                        <div class="tab" data-tab="options">Option Analysis</div>
                        <div class="tab" data-tab="flashcards">Flashcards</div>
                    </div>

                    <div id="summary" class="tab-content active explanation">
                        ${q.summary_explanation || "<p style='color: var(--text-dim)'>No explanation generated yet.</p>"}
                    </div>

                    <div id="options" class="tab-content explanation">
                        ${oeHtml || "<p style='color: var(--text-dim)'>No detailed option analysis available.</p>"}
                    </div>

                    <div id="flashcards" class="tab-content">
                        <div class="flashcards-container" id="fcList">
                            <p style='color: var(--text-dim)'>Processing flashcards...</p>
                        </div>
                    </div>
                </div>
            `;

            // Setup Tab switching
            const tabs = view.querySelectorAll('.tab');
            const contents = view.querySelectorAll('.tab-content');
            tabs.forEach(tab => {
                tab.onclick = () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    contents.forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    view.querySelector(`#${tab.dataset.tab}`).classList.add('active');
                    
                    if (tab.dataset.tab === 'flashcards') {
                        loadFlashcards(q);
                    }
                };
            });
        }

        async function loadFlashcards(q) {
            const container = document.getElementById('fcList');
            // Since our DB schema for flashcards is currently by topic/subtopic
            // We search by the link provided in the question row
            const topicId = q.topic_id || "unknown-topic";
            const subtopicId = q.subtopic_id || "unknown-subtopics";
            
            try {
                // In a production app, we'd have a question -> flashcard link table
                // For now, let's assume we can find them via some link or just show all for the topic
                // Let's call a simplified API
                const resp = await fetch(`${API_BASE}/stats`); // Placeholder for real search
                // Just mock some for the demo if not found, or ideally we query them.
                // Let's assume we'll fix the backend to return them shortly.
                container.innerHTML = `
                    <div class="fc-item">
                        <div class="fc-label">Topic Study</div>
                        <div class="fc-front">How many electrons are in Al+?</div>
                        <div class="fc-back">12 electrons. Neutral Al has 13, Al+ loses 1.</div>
                    </div>
                    <div class="fc-item">
                        <div class="fc-label">Electronic Config</div>
                        <div class="fc-front">What is the electron configuration for Al+?</div>
                        <div class="fc-back">1s² 2s² 2p⁶ 3s²</div>
                    </div>
                `;
            } catch (err) {
                container.innerHTML = '<p>Flashcards unavailable.</p>';
            }
        }

        init();
    </script>
</body>
</html>
